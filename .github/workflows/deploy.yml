name: Deploy TrailRun PWA a GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'app/**'        # Solo redeploya si cambia la PWA
  workflow_dispatch:    # Permite lanzar manualmente desde la UI de GitHub

permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultáneos
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      # Subir solo la carpeta app/ como artefacto de Pages
      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: './app'

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
